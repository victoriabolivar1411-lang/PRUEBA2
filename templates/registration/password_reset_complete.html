{% extends 'experto/base.html' %}
{% block title %}Contraseña Actualizada — Sistema TEA{% endblock %}
{% block content %}
<div style="min-height:70vh;display:flex;align-items:center;justify-content:center">
  <div style="background:var(--c-card);border:1px solid var(--c-border);border-radius:var(--r-lg);padding:2.5rem;width:100%;max-width:420px;text-align:center">
    <div style="font-size:3rem;margin-bottom:1rem">🎉</div>
    <h2 style="color:var(--c-white);margin-bottom:.5rem">¡Contraseña actualizada!</h2>
    <p style="color:var(--c-muted);line-height:1.6;margin-bottom:1.5rem">
      Tu contraseña ha sido cambiada exitosamente. Ya puedes iniciar sesión con tu nueva contraseña.
    </p>
    <a href="{% url 'login' %}" class="btn btn-primary" style="display:inline-flex;justify-content:center">
      🔓 Ir al inicio de sesión
    </a>
  </div>
</div>
{% endblock %}
